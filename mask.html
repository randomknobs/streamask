<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Abstract Face Mask</title>
<style>
  :root { --bg:#08090c; --fg:#e8e8ee; --dim:#6a6c78; --acc:#7cf6c8; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
              font:13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; }
  #stage { position:fixed; inset:0; display:grid; place-items:center; overflow:hidden; }
  #wrap { position:relative; }
  #cam, #gl { display:block; border-radius:2px; }
  #cam { transform: scaleX(-1); }
  #gl { position:absolute; inset:0; }
  #ui { position:fixed; left:14px; top:14px; z-index:10; display:flex; flex-direction:column;
        gap:8px; padding:12px; background:rgba(12,13,17,.82); border:1px solid #23252e;
        border-radius:6px; backdrop-filter: blur(8px); max-width:250px; }
  #ui.hidden { display:none; }
  .row { display:flex; gap:6px; align-items:center; }
  button { background:#181a21; color:var(--fg); border:1px solid #2c2f3a; border-radius:4px;
           padding:6px 10px; font:inherit; cursor:pointer; }
  button:hover { border-color:var(--acc); color:var(--acc); }
  button.on { border-color:var(--acc); color:var(--acc); }
  input[type=range] { width:100%; accent-color:var(--acc); }
  .lbl { color:var(--dim); font-size:11px; letter-spacing:.04em; text-transform:uppercase; }
  #seed { color:var(--acc); font-size:11px; word-break:break-all; }
  #gate { position:fixed; inset:0; z-index:30; display:grid; place-items:center;
          background:rgba(8,9,12,.94); gap:0; }
  #gate.done { display:none; }
  #gatebox { display:flex; flex-direction:column; gap:14px; align-items:center; text-align:center;
             max-width:420px; padding:0 24px; }
  #gatebox h1 { font-size:15px; font-weight:500; margin:0; letter-spacing:.02em; }
  #gatebox p { margin:0; color:var(--dim); font-size:12px; line-height:1.6; }
  #allow { padding:12px 22px; font-size:14px; border-color:var(--acc); color:var(--acc); }
  select { background:#181a21; color:var(--fg); border:1px solid #2c2f3a; border-radius:4px;
           padding:6px 8px; font:inherit; max-width:100%; }
  #status { position:fixed; bottom:12px; left:14px; color:var(--dim); font-size:11px; z-index:10; }
  #err { position:fixed; inset:auto 14px 14px 14px; color:#ff8080; font-size:12px; z-index:20; }
</style>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
</head>
<body>

<div id="stage"><div id="wrap">
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="gl"></canvas>
</div></div>

<div id="gate">
  <div id="gatebox">
    <h1>Доступ к камере</h1>
    <p>Нажми кнопку — Chrome покажет свой запрос, там жми «Разрешить».
       Работает только по https или http://localhost.</p>
    <button id="allow">Включить камеру</button>
    <div id="gateerr" style="color:#ff8080;font-size:12px"></div>
  </div>
</div>

<div id="ui">
  <div class="lbl">камера</div>
  <select id="devices"></select>
  <div class="lbl">seed</div>
  <div id="seed">—</div>
  <div class="row">
    <button id="reroll">новая (R)</button>
    <button id="auto">auto</button>
  </div>
  <div class="row"><button id="skin">кожа</button><button id="shards">осколки</button></div>
  <div class="lbl">сглаживание</div>
  <input id="smooth" type="range" min="0" max="0.95" step="0.05" value="0.6">
  <div class="lbl">размер</div>
  <input id="scale" type="range" min="0.4" max="2.2" step="0.05" value="1">
  <div class="lbl">хромакей</div>
  <div class="row"><button id="chroma">фон зелёный</button></div>
  <div class="lbl">H — спрятать панель</div>
</div>

<div id="status">инициализация…</div>
<div id="err"></div>

<script type="module">
import * as THREE from 'three';
import { FaceLandmarker, FilesetResolver } from
  'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/vision_bundle.mjs';

const $ = id => document.getElementById(id);
const video = $('cam'), canvas = $('gl'), statusEl = $('status'), errEl = $('err');

/* ────────────────────────── seeded rng ────────────────────────── */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let rnd = mulberry32(1);
const R  = (a=1,b=0)=>b+rnd()*(a-b);
const RI = (a,b=0)=>Math.floor(R(a,b));
const pick = arr => arr[RI(arr.length)];

/* ────────────────────────── three setup ───────────────────────── */
const renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene = new THREE.Scene();
let camera = new THREE.OrthographicCamera(-1,1,1,-1,-10,10);

scene.add(new THREE.AmbientLight(0xffffff,1.1));
const d1 = new THREE.DirectionalLight(0xffffff,1.4); d1.position.set(1,1,2); scene.add(d1);
const d2 = new THREE.DirectionalLight(0x88aaff,.7); d2.position.set(-1.5,-.5,1); scene.add(d2);

// анкер лица: локальные координаты, 1.0 = межзрачковое расстояние
const anchor = new THREE.Group();
anchor.matrixAutoUpdate = false;
scene.add(anchor);

/* ────────────────────────── палитры ───────────────────────────── */
function palette(){
  const h = R(1), s = R(.95,.55), l = R(.68,.42);
  const scheme = pick(['analog','complement','triad','split','mono']);
  const offs = { analog:[0,.06,-.06,.12], complement:[0,.5,.04,.54],
                 triad:[0,.333,.666,.166], split:[0,.42,.58,.08], mono:[0,0,0,0] }[scheme];
  return offs.map((o,i)=> new THREE.Color().setHSL((h+o+1)%1,
      scheme==='mono'? s*(1-i*.15) : s, scheme==='mono'? l*(1+i*.12) : l*R(1.15,.8)));
}

/* ────────────────────────── skin shader ───────────────────────── */
const skinMat = new THREE.ShaderMaterial({
  transparent:true, side:THREE.DoubleSide, depthWrite:false,
  uniforms:{ t:{value:0}, cA:{value:new THREE.Color()}, cB:{value:new THREE.Color()},
             cC:{value:new THREE.Color()}, freq:{value:12}, warp:{value:1},
             bands:{value:0}, spd:{value:.3}, op:{value:.9} },
  vertexShader:`varying vec2 vU; varying vec3 vP;
    void main(){ vU=uv; vP=position;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
  fragmentShader:`precision highp float;
    uniform float t,freq,warp,bands,spd,op; uniform vec3 cA,cB,cC;
    varying vec2 vU; varying vec3 vP;
    float h(vec2 p){return fract(sin(dot(p,vec2(41.3,289.1)))*43758.5453);}
    float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
    void main(){
      vec2 p=vU*freq;
      float w=n(p*.5+t*spd)*warp;
      float v=sin(p.x+p.y*.6+w*3.0+t*spd*2.0)*.5+.5;
      if(bands>.5) v=step(.5,v)*.85+v*.15;
      vec3 c=mix(cA,cB,v);
      c=mix(c,cC,smoothstep(.3,.9,n(p*.3-t*spd*.5)));
      gl_FragColor=vec4(c,op);
    }`
});

// геометрия «кожи» — треугольники из tesselation
let skinGeo = null, skinMesh = null, TRI = null;
function buildTriangles(){
  const t = FaceLandmarker.FACE_LANDMARKS_TESSELATION;
  const idx = [];
  for(let i=0;i+2<t.length;i+=3) idx.push(t[i].start, t[i+1].start, t[i+2].start);
  return new Uint16Array(idx);
}

/* ────────────────────────── генератор маски ───────────────────── */
let current = { group:null, seed:'', anim:[] };

const GEOMS = [
  ()=> new THREE.IcosahedronGeometry(1, RI(2)),
  ()=> new THREE.TetrahedronGeometry(1, RI(2)),
  ()=> new THREE.OctahedronGeometry(1, RI(2)),
  ()=> new THREE.BoxGeometry(1, R(2.5,.2), R(.6,.05)),
  ()=> new THREE.TorusGeometry(1, R(.4,.06), 8, RI(24,5)),
  ()=> new THREE.ConeGeometry(R(.7,.15), R(2.5,.5), RI(10,3)),
  ()=> new THREE.CylinderGeometry(R(.7,.05), R(.7,.05), R(2,.2), RI(12,3), 1, R()<.4),
  ()=> new THREE.RingGeometry(R(.8,.3), 1, RI(20,4)),
  ()=> new THREE.SphereGeometry(1, RI(14,4), RI(10,3)),
  ()=> new THREE.TorusKnotGeometry(1, R(.35,.08), 48, 6, RI(4,1), RI(4,2)),
];

function makeMaterial(cols){
  const c = pick(cols);
  const kind = R();
  if(kind < .22) return new THREE.MeshBasicMaterial({color:c, wireframe:true});
  if(kind < .34) return new THREE.MeshBasicMaterial({color:c, transparent:true, opacity:R(.65,.25),
                                                     side:THREE.DoubleSide});
  return new THREE.MeshStandardMaterial({
    color:c, side:THREE.DoubleSide, flatShading:R()<.6,
    roughness:R(.95,.1), metalness:R(1,0),
    emissive:R()<.35 ? pick(cols) : 0x000000, emissiveIntensity:R(.8,.1)
  });
}

function seedFrom(str){ let h=2166136261; for(const ch of str){h^=ch.charCodeAt(0);h=Math.imul(h,16777619);} return h>>>0; }

function generate(seedStr){
  if(current.group){ scene.remove(current.group); anchor.remove(current.group);
    current.group.traverse(o=>{o.geometry?.dispose(); o.material?.dispose?.();}); }

  current.seed = seedStr || Math.random().toString(36).slice(2,9);
  rnd = mulberry32(seedFrom(current.seed));
  $('seed').textContent = current.seed;
  location.hash = current.seed;

  const cols = palette();
  const g = new THREE.Group();
  const anim = [];

  const style = pick(['shards','plates','rings','spikes','orbit','grid']);
  const symmetric = R() < .78;
  const n = RI(14,4);

  for(let i=0;i<n;i++){
    const geo = GEOMS[style==='rings' ? 4 : style==='spikes' ? 5 : RI(GEOMS.length)]();
    const mesh = new THREE.Mesh(geo, makeMaterial(cols));

    let px, py, pz;
    if(style==='orbit'){
      const a = R(Math.PI*2), rr = R(1.6,.7);
      px = Math.cos(a)*rr; py = Math.sin(a)*rr*.9; pz = R(.9,.1);
    } else if(style==='grid'){
      px = (RI(4)-1.5)*.5; py = (RI(5)-2)*.45; pz = R(.8,.3);
    } else {
      px = R(1.5,.05); py = R(1.2,-1.2); pz = R(1.0,.15);
    }
    if(!symmetric && R()<.5) px = -px;

    const s = R(.42,.05) * (style==='spikes' ? R(1.4,.5) : 1);
    mesh.position.set(px,py,pz);
    mesh.scale.set(s, s*R(1.6,.5), s*R(1.4,.4));
    mesh.rotation.set(R(6.28),R(6.28),R(6.28));

    const item = { mesh, spin:new THREE.Vector3(R(.9,-.9),R(.9,-.9),R(.9,-.9)).multiplyScalar(R()<.5?0:1),
                   pulse:R()<.35 ? R(3,.5) : 0, base:mesh.scale.clone(), ph:R(6.28) };
    g.add(mesh); anim.push(item);

    if(symmetric && Math.abs(px)>.08){
      const m2 = mesh.clone(); m2.position.x = -px; m2.rotation.y = -mesh.rotation.y;
      m2.rotation.z = -mesh.rotation.z; g.add(m2);
      anim.push({ mesh:m2, spin:item.spin.clone().multiply(new THREE.Vector3(1,-1,-1)),
                  pulse:item.pulse, base:m2.scale.clone(), ph:item.ph });
    }
  }

  anchor.add(g);
  current.group = g; current.anim = anim;

  // настройки шейдера кожи
  skinMat.uniforms.cA.value.copy(cols[0]);
  skinMat.uniforms.cB.value.copy(cols[1] || cols[0]);
  skinMat.uniforms.cC.value.copy(cols[2] || cols[0]);
  skinMat.uniforms.freq.value = R(28,4);
  skinMat.uniforms.warp.value = R(3,0);
  skinMat.uniforms.bands.value = R()<.45 ? 1 : 0;
  skinMat.uniforms.spd.value = R(.8,.05);
  skinMat.uniforms.op.value = R(.95,.55);
}

/* ────────────────────────── mediapipe ─────────────────────────── */
let landmarker = null;
async function initMP(){
  statusEl.textContent = 'загрузка модели…';
  const fileset = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm');
  landmarker = await FaceLandmarker.createFromOptions(fileset, {
    baseOptions:{ modelAssetPath:
      'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
      delegate:'GPU' },
    runningMode:'VIDEO', numFaces:1, outputFaceBlendshapes:false
  });
  TRI = buildTriangles();
  skinGeo = new THREE.BufferGeometry();
  skinGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(478*3),3));
  skinGeo.setAttribute('uv', new THREE.BufferAttribute(new Float32Array(478*2),2));
  skinGeo.setIndex(new THREE.BufferAttribute(TRI,1));
  skinMesh = new THREE.Mesh(skinGeo, skinMat);
  skinMesh.frustumCulled = false;
  scene.add(skinMesh);
}

let currentStream = null;
async function initCam(deviceId){
  statusEl.textContent = 'камера…';
  if(currentStream) currentStream.getTracks().forEach(t => t.stop());
  const constraints = { audio:false, video:{ width:{ideal:1280}, height:{ideal:720} } };
  if(deviceId) constraints.video.deviceId = { exact: deviceId };
  else constraints.video.facingMode = 'user';
  currentStream = await navigator.mediaDevices.getUserMedia(constraints);
  video.srcObject = currentStream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
  resize();
}

async function listDevices(){
  const sel = $('devices');
  const devs = (await navigator.mediaDevices.enumerateDevices())
                 .filter(d => d.kind === 'videoinput');
  const active = currentStream?.getVideoTracks()[0]?.getSettings()?.deviceId;
  sel.innerHTML = '';
  devs.forEach((d,i) => {
    const o = document.createElement('option');
    o.value = d.deviceId; o.textContent = d.label || `камера ${i+1}`;
    if(d.deviceId === active) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = async () => {
    try { await initCam(sel.value); } catch(e){ errEl.textContent = 'Ошибка: ' + e.message; }
  };
}

let aspect = 16/9;
function resize(){
  const vw = video.videoWidth || 1280, vh = video.videoHeight || 720;
  aspect = vw/vh;
  const maxW = innerWidth, maxH = innerHeight;
  let w = maxW, h = w/aspect;
  if(h > maxH){ h = maxH; w = h*aspect; }
  video.style.width = canvas.style.width = w+'px';
  video.style.height = canvas.style.height = h+'px';
  renderer.setSize(w,h,false);
  camera.left = -aspect; camera.right = aspect; camera.top = 1; camera.bottom = -1;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);

/* ────────────────────────── трекинг → анкер ───────────────────── */
const V = i => new THREE.Vector3();
const tmpA = new THREE.Vector3(), tmpB = new THREE.Vector3(), tmpC = new THREE.Vector3();
const ax = new THREE.Vector3(), ay = new THREE.Vector3(), az = new THREE.Vector3();
const M = new THREE.Matrix4();
const curPos = new THREE.Vector3(), curQuat = new THREE.Quaternion();
const tgtPos = new THREE.Vector3(), tgtQuat = new THREE.Quaternion();
let curScale = .2, has = false;

// экранные координаты (зеркалим по X — селфи)
function toWorld(lm, out){
  out.set(-(lm.x-.5)*2*aspect, -(lm.y-.5)*2, -lm.z*2*aspect);
  return out;
}

let userScale = 1, smoothing = .6, showSkin = true, showShards = true;

function updateAnchor(lms){
  const eyeR = toWorld(lms[33], tmpA);   // внешний угол одного глаза
  const eyeL = toWorld(lms[263], tmpB);
  const chin = toWorld(lms[152], tmpC);
  const fore = toWorld(lms[10], new THREE.Vector3());
  const nose = toWorld(lms[1], new THREE.Vector3());

  ax.copy(eyeL).sub(eyeR);
  const ipd = ax.length() || .2;
  ax.normalize();
  ay.copy(fore).sub(chin).normalize();
  az.crossVectors(ax, ay).normalize();
  ay.crossVectors(az, ax).normalize();

  M.makeBasis(ax, ay, az);
  tgtQuat.setFromRotationMatrix(M);
  tgtPos.copy(nose);

  const k = 1 - Math.pow(smoothing, 1/3) * .0 - smoothing; // 0 = мгновенно
  const lerpK = has ? Math.max(.04, 1 - smoothing) : 1;
  curPos.lerp(tgtPos, lerpK);
  curQuat.slerp(tgtQuat, lerpK);
  curScale += (ipd - curScale) * lerpK;
  has = true;

  const s = curScale * userScale;
  anchor.matrix.compose(curPos, curQuat, new THREE.Vector3(s,s,s));
  anchor.matrixWorldNeedsUpdate = true;
}

function updateSkin(lms){
  const pos = skinGeo.attributes.position.array;
  const uv  = skinGeo.attributes.uv.array;
  const v = new THREE.Vector3();
  const n = Math.min(lms.length, 478);
  for(let i=0;i<n;i++){
    toWorld(lms[i], v);
    pos[i*3]=v.x; pos[i*3+1]=v.y; pos[i*3+2]=v.z + .002;
    uv[i*2]=lms[i].x; uv[i*2+1]=1-lms[i].y;
  }
  skinGeo.attributes.position.needsUpdate = true;
  skinGeo.attributes.uv.needsUpdate = true;
  skinGeo.computeVertexNormals();
}

/* ────────────────────────── loop ──────────────────────────────── */
let lastTs = -1, t0 = performance.now(), frames = 0, fps = 0, fpsT = performance.now();
function loop(){
  requestAnimationFrame(loop);
  if(!landmarker || video.readyState < 2) return;

  const now = performance.now();
  if(video.currentTime !== lastTs){
    lastTs = video.currentTime;
    const res = landmarker.detectForVideo(video, now);
    if(res.faceLandmarks && res.faceLandmarks.length){
      const lms = res.faceLandmarks[0];
      updateAnchor(lms);
      if(showSkin) updateSkin(lms);
      anchor.visible = showShards;
      if(skinMesh) skinMesh.visible = showSkin;
    } else {
      anchor.visible = false;
      if(skinMesh) skinMesh.visible = false;
    }
  }

  const t = (now - t0)/1000;
  skinMat.uniforms.t.value = t;
  for(const a of current.anim){
    a.mesh.rotation.x += a.spin.x*.01;
    a.mesh.rotation.y += a.spin.y*.01;
    a.mesh.rotation.z += a.spin.z*.01;
    if(a.pulse){ const k = 1 + Math.sin(t*a.pulse + a.ph)*.18;
      a.mesh.scale.set(a.base.x*k, a.base.y*k, a.base.z*k); }
  }

  renderer.render(scene, camera);

  frames++;
  if(now - fpsT > 500){ fps = Math.round(frames*1000/(now-fpsT)); frames=0; fpsT=now;
    statusEl.textContent = `${fps} fps · seed ${current.seed}`; }
}

/* ────────────────────────── ui ────────────────────────────────── */
let autoTimer = null;
$('reroll').onclick = () => generate();
$('auto').onclick = e => {
  if(autoTimer){ clearInterval(autoTimer); autoTimer=null; e.target.classList.remove('on'); }
  else { autoTimer = setInterval(()=>generate(), 8000); e.target.classList.add('on'); }
};
$('skin').onclick   = e => { showSkin = !showSkin;   e.target.classList.toggle('on', showSkin); };
$('shards').onclick = e => { showShards = !showShards; e.target.classList.toggle('on', showShards); };
$('skin').classList.add('on'); $('shards').classList.add('on');
$('smooth').oninput = e => smoothing = +e.target.value;
$('scale').oninput  = e => userScale = +e.target.value;
$('chroma').onclick = e => {
  const on = document.body.style.background !== 'rgb(0, 255, 0)';
  document.body.style.background = on ? '#00ff00' : 'var(--bg)';
  video.style.display = on ? 'none' : 'block';
  e.target.classList.toggle('on', on);
};
addEventListener('keydown', e => {
  if(e.key==='r'||e.key==='R'||e.key==='к'||e.key==='К') generate();
  if(e.key==='h'||e.key==='H'||e.key==='р'||e.key==='Р') $('ui').classList.toggle('hidden');
});

/* ────────────────────────── boot ──────────────────────────────── */
function camError(err){
  if(!window.isSecureContext) return 'Небезопасный контекст. Открой через http://localhost или https, file:// камеру не отдаст.';
  switch(err.name){
    case 'NotAllowedError': return 'Доступ запрещён. Нажми на иконку камеры в адресной строке → Разрешить, и жми кнопку снова.';
    case 'NotFoundError':   return 'Камера не найдена.';
    case 'NotReadableError':return 'Камера занята другой программой (OBS, Zoom, Telegram?). Закрой и попробуй снова.';
    case 'OverconstrainedError': return 'Это устройство не поддерживает запрошенный режим.';
    default: return err.name + ': ' + err.message;
  }
}

let started = false;
async function start(deviceId){
  if(started) return;
  const btn = $('allow');
  btn.disabled = true; btn.textContent = 'подключаюсь…';
  $('gateerr').textContent = '';
  try {
    await initCam(deviceId);
    await listDevices();
    $('gate').classList.add('done');
    started = true;
    await initMP();
    generate(location.hash.slice(1) || undefined);
    statusEl.textContent = 'ok';
    loop();
  } catch(err){
    console.error(err);
    $('gateerr').textContent = camError(err);
    btn.disabled = false; btn.textContent = 'Попробовать снова';
  }
}
$('allow').onclick = () => start();

// если разрешение уже выдано (OBS / повторный заход) — стартуем сами
(async () => {
  try {
    const p = await navigator.permissions.query({ name:'camera' });
    if(p.state === 'granted') start();
  } catch(e){ /* Firefox/Safari не умеют — ждём кнопку */ }
})();
