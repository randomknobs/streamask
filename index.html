<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Abstract Face Mask</title>
<link rel="icon" href="favicon.ico">
<style>
  :root { --bg:#08090c; --fg:#e8e8ee; --dim:#6a6c78; --acc:#7cf6c8; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
              font:13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; }
  body.hide-cursor, body.hide-cursor #stage, body.hide-cursor #cam, body.hide-cursor #gl { cursor:none; }
  #stage { position:fixed; inset:0; display:grid; place-items:center; overflow:hidden; }
  #wrap { position:relative; }
  #cam, #gl { display:block; border-radius:2px; }
  #cam { transform: scaleX(-1); }
  #gl { position:absolute; inset:0; }
  #ui { position:fixed; left:14px; top:14px; z-index:10; display:flex; flex-direction:column;
        gap:8px; padding:12px; background:rgba(12,13,17,.82); border:1px solid #23252e;
        border-radius:6px; backdrop-filter: blur(8px); max-width:250px; }
  #ui.hidden { display:none; }
  .row { display:flex; gap:6px; align-items:center; }
  button { background:#181a21; color:var(--fg); border:1px solid #2c2f3a; border-radius:4px;
           padding:6px 10px; font:inherit; cursor:pointer; }
  button:hover { border-color:var(--acc); color:var(--acc); }
  button.on { border-color:var(--acc); color:var(--acc); }
  input[type=range] { width:100%; accent-color:var(--acc); }
  .lbl { color:var(--dim); font-size:11px; letter-spacing:.04em; text-transform:uppercase; }
  #gate { position:fixed; inset:0; z-index:30; display:grid; place-items:center;
          background:rgba(8,9,12,.94); gap:0; }
  #gate.done { display:none; }
  #gatebox { display:flex; flex-direction:column; gap:14px; align-items:center; text-align:center;
             max-width:420px; padding:0 24px; }
  #gatebox h1 { font-size:15px; font-weight:500; margin:0; letter-spacing:.02em; }
  #gatebox p { margin:0; color:var(--dim); font-size:12px; line-height:1.6; }
  #allow { padding:12px 22px; font-size:14px; border-color:var(--acc); color:var(--acc); }
  select { background:#181a21; color:var(--fg); border:1px solid #2c2f3a; border-radius:4px;
           padding:6px 8px; font:inherit; max-width:100%; }
  #status { position:fixed; bottom:12px; left:14px; color:var(--dim); font-size:11px; z-index:10; }
  #err { position:fixed; inset:auto 14px 14px 14px; color:#ff8080; font-size:12px; z-index:20; }
  #galleryModal { position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center; }
  #galleryModal.modal-hidden { display:none; }
  #galleryModalBackdrop { position:absolute; inset:0; background:rgba(4,5,7,.88); backdrop-filter:blur(4px); }
  #galleryModalBox { position:relative; width:min(1100px,92vw); height:min(820px,88vh); display:flex;
                      flex-direction:column; gap:12px; background:rgba(12,13,17,.97); border:1px solid #23252e;
                      border-radius:8px; padding:16px; }
  #galleryModalHead { display:flex; justify-content:space-between; align-items:center; font-size:12px;
                       color:var(--dim); letter-spacing:.04em; text-transform:uppercase; }
  #galleryModalClose { padding:2px 10px; font-size:16px; line-height:1; }
  #gallery { flex:1; display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px;
             overflow-y:auto; align-content:start; }
  .thumb { position:relative; cursor:pointer; border:1px solid #2c2f3a; border-radius:4px; overflow:hidden; aspect-ratio:1; }
  .thumb:hover { border-color:var(--acc); }
  .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .thumb-name { position:absolute; left:0; right:0; bottom:0; padding:4px 6px; font-size:11px; line-height:1.3;
                background:rgba(8,9,12,.75); color:var(--fg); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .thumb-del { position:absolute; top:4px; right:4px; padding:2px 7px; font-size:13px; line-height:1.6;
               background:rgba(8,9,12,.75); border-color:#3a2c2c; }
  .thumb-del:hover { border-color:#ff8080; color:#ff8080; }
  .chk { display:flex; gap:5px; align-items:center; font-size:11px; color:var(--dim); cursor:pointer; }
  #recStatus { display:none; align-items:center; gap:6px; color:#ff5c5c; font-size:11px; }
  #recDot { width:8px; height:8px; border-radius:50%; background:#ff5c5c; display:inline-block;
            animation: recblink 1s infinite; }
  @keyframes recblink { 0%,100% { opacity:1; } 50% { opacity:.25; } }
</style>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
</head>
<body>

<div id="stage"><div id="wrap">
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="gl"></canvas>
</div></div>

<div id="gate">
  <div id="gatebox">
    <h1>Camera access</h1>
    <p>Click the button — your browser will show its own prompt, click "Allow" there.
       Works only over https or http://localhost.</p>
    <button id="allow">Enable camera</button>
    <div id="gateerr" style="color:#ff8080;font-size:12px"></div>
  </div>
</div>

<div id="ui">
  <div class="lbl">camera</div>
  <select id="devices"></select>
  <div class="row">
    <button id="reroll">new (R)</button>
    <button id="auto">auto</button>
    <button id="freeze">freeze</button>
  </div>
  <div class="row">
    <button id="skin">skin</button><button id="shards">shards</button><button id="crown">crown</button>
  </div>
  <div class="row">
    <button id="eyes">eyes</button><button id="brows">brows</button><button id="mouth">mouth</button>
  </div>
  <div class="lbl">shard density</div>
  <input id="density" type="range" min="0.3" max="2.0" step="0.05" value="1">
  <div class="lbl">expression reaction</div>
  <input id="mouthReaction" type="range" min="0" max="3" step="0.1" value="1">
  <div class="lbl">scale</div>
  <input id="scale" type="range" min="0.4" max="2.2" step="0.05" value="1">
  <div class="lbl">skin extension</div>
  <input id="skinExtension" type="range" min="0" max="1.0" step="0.05" value="1">
  <div class="lbl">skin width</div>
  <input id="skinWidth" type="range" min="0" max="1.0" step="0.05" value="1">
  <div class="lbl">chroma key</div>
  <div class="row"><button id="chroma">green screen</button></div>

  <div class="lbl">recording</div>
  <div class="row">
    <button id="record">● record (V)</button>
    <button id="share">share</button>
  </div>
  <div id="recStatus"><span id="recDot"></span><span id="recTimer">00:00</span></div>
  <div id="recFormatNote" style="display:none;color:var(--dim);font-size:10px;"></div>
  <div class="row">
    <label class="chk"><input id="micToggle" type="checkbox"> mic</label>
    <label class="chk"><input id="transparentToggle" type="checkbox"> transparent bg</label>
  </div>

  <div class="row">
    <button id="save">save</button>
    <button id="collectionBtn">collection <span id="galleryCount">0/40</span></button>
  </div>

  <div class="lbl">H — hide panel</div>
</div>

<div id="galleryModal" class="modal-hidden">
  <div id="galleryModalBackdrop"></div>
  <div id="galleryModalBox">
    <div id="galleryModalHead">
      <span>collection <span id="galleryModalCount">0/40</span></span>
      <button id="galleryModalClose">×</button>
    </div>
    <div id="gallery"></div>
  </div>
</div>

<div id="status">initializing…</div>
<div id="err"></div>

<script type="module" src="src/main.js"></script>
</body>
</html>
